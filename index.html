<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Vista Studio</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;500;600&display=swap' rel='stylesheet'><style>*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{background:#050505;color:#f5efe6;font-family:Manrope,sans-serif;overflow-x:hidden}nav{position:fixed;top:0;width:100%;z-index:1000;padding:28px 6vw;background:linear-gradient(to bottom,rgba(0,0,0,.78),transparent);backdrop-filter:blur(10px)}nav ul{display:flex;justify-content:center;gap:52px;list-style:none}nav a{text-decoration:none;color:#ebe1d5;font-size:.78rem;letter-spacing:.22rem;text-transform:uppercase;opacity:.88;transition:.3s}nav a:hover{opacity:1;color:#cba76b}section{padding:120px 6vw}.hero{height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;position:relative;overflow:hidden}.hero:before{content:'';position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1511818966892-d7d671e672a2?q=80&w=2200&auto=format&fit=crop') center/cover no-repeat;filter:brightness(.42)}.hero:after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.93),rgba(0,0,0,.28))}.hero-content{position:relative;z-index:2;max-width:1000px;padding:0 6vw}.hero-logo{width:560px;max-width:82vw;margin-bottom:42px;object-fit:contain;filter:drop-shadow(0 0 35px rgba(255,255,255,.04))}.hero h1,.section-title,.overlay h3,.price-card h3,.process-card h3{font-family:'Cormorant Garamond',serif;font-weight:500}.hero h1{font-size:clamp(2.7rem,4.4vw,5rem);line-height:.96;letter-spacing:-.03em;max-width:900px;margin:auto}.hero em,.section-title em{font-style:italic;color:#cba76b}.stats{padding:80px 6vw;border-top:1px solid rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.05)}.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:40px}.stat h2{font-family:'Cormorant Garamond',serif;font-size:3.3rem;font-weight:500;margin-bottom:10px}.stat p{font-size:1rem;line-height:1.7;color:#cabcae}.section-title{font-size:clamp(3rem,5vw,5rem);line-height:1}.section-sub{margin-top:20px;color:#c5b8ab;font-size:1rem;line-height:1.8;max-width:650px}@media(max-width:900px){nav ul{gap:18px;flex-wrap:wrap}.hero-logo{width:300px}.hero h1{font-size:3.2rem}.stats-grid{grid-template-columns:1fr}.section{padding:90px 7vw}}</style></head><body><nav><ul><li><a href='#process'>Process</a></li><li><a href='#portfolio'>Portfolio</a></li><li><a href='#pricing'>Pricing</a></li><li><a href='#contact'>Contact</a></li></ul></nav><section class='hero'><div class='hero-content'><img class='hero-logo' src='logo.png' alt='Vista Studio'><h1>Listings that make people <em>stop scrolling</em></h1></div></section><section class='stats'><div class='stats-grid'><div class='stat'><h2>4K</h2><p>Shot on Sony A7C full-frame professional camera</p></div><div class='stat'><h2>5–7</h2><p>48h rush available for urgent listings</p></div><div class='stat'><h2>3×</h2><p>Listings with video get more buyer contact</p></div><div class='stat'><h2>SFL</h2><p>Boca Raton — serving all of South Florida</p></div></div></section></body></html>
