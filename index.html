<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Vista Studio</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500;6..96,600&display=swap' rel='stylesheet'><style>*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{background:#050505;color:#f5efe6;font-family:Manrope,sans-serif;overflow-x:hidden}nav{position:fixed;top:0;width:100%;z-index:1000;padding:26px 6vw;background:linear-gradient(to bottom,rgba(0,0,0,.82),transparent)}nav ul{display:flex;justify-content:center;gap:48px;list-style:none}nav a{text-decoration:none;color:#ebe1d5;font-size:.82rem;letter-spacing:.18rem;text-transform:uppercase;opacity:.88;transition:.3s}nav a:hover{opacity:1;color:#cba76b}section{padding:120px 6vw}.hero{height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;position:relative;overflow:hidden}.hero:before{content:'';position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1511818966892-d7d671e672a2?q=80&w=2200&auto=format&fit=crop') center/cover no-repeat;filter:brightness(.42)}.hero:after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92),rgba(0,0,0,.38))}.hero-content{position:relative;z-index:2;max-width:1000px;padding:0 6vw}.hero-logo{width:300px;max-width:70vw;margin-bottom:34px;object-fit:contain}.hero h1,.section-title,.overlay h3,.price-card h3,.process-card h3{font-family:'Bodoni Moda',serif;font-weight:500}.hero h1{font-size:clamp(4rem,6.2vw,6.8rem);line-height:.95;letter-spacing:-.03em}.hero em,.section-title em{font-style:italic;color:#cba76b}.stats{padding:75px 6vw;border-top:1px solid rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.05)}.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:40px}.stat h2{font-family:'Bodoni Moda',serif;font-size:3.6rem;font-weight:500;margin-bottom:10px}.stat p{font-size:.98rem;line-height:1.7;color:#cabcae}.section-title{font-size:clamp(3rem,5vw,5.2rem);line-height:1}.section-sub{margin-top:20px;color:#c5b8ab;font-size:1rem;line-height:1.8;max-width:650px}.process-grid,.pricing-grid{display:grid;gap:22px;margin-top:70px}.process-grid{grid-template-columns:repeat(4,1fr)}.process-card{background:#0a0a0a;border:1px solid rgba(255,255,255,.05);padding:38px;border-radius:30px}.eyebrow{font-size:.7rem;letter-spacing:.24rem;text-transform:uppercase;color:#cba76b}.process-card h3{font-size:2rem;margin:18px 0}.process-card p{font-size:.98rem;line-height:1.8;color:#c7bbaf}.portfolio-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:22px;margin-top:70px}.portfolio-item{position:relative;border-radius:34px;overflow:hidden}.portfolio-item img{width:100%;height:100%;object-fit:cover;filter:brightness(.88);transition:1.2s}.portfolio-item:hover img{transform:scale(1.04)}.large{height:720px}.stack{display:grid;gap:22px}.small{height:349px}.overlay{position:absolute;left:36px;bottom:36px}.overlay h3{font-size:2.3rem}.pricing-grid{grid-template-columns:repeat(3,1fr);border:1px solid rgba(203,167,107,.16)}.price-card{padding:48px;background:#050505;border-right:1px solid rgba(203,167,107,.15)}.price-card:last-child{border-right:none}.featured{background:#0b0b0b;border-top:2px solid #cba76b}.price-card h3{font-size:2.7rem;margin-top:14px}.price{font-size:3.3rem;color:#cba76b;margin:10px 0}.smalltext{font-size:.95rem;color:#b7aa9b}.price-card ul{list-style:none;margin:34px 0}.price-card li{font-size:.98rem;line-height:1.8;color:#e2d8ce;margin-bottom:12px}.price-btn{display:block;text-align:center;padding:16px;border:1px solid rgba(203,167,107,.25);text-decoration:none;color:#f5efe6;margin-top:32px;font-size:.78rem;letter-spacing:.16rem;text-transform:uppercase}.featured .price-btn{background:#cba76b;color:#050505}.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:90px;margin-top:70px}.contact-info p,.meta p,.contact-form input,.contact-form textarea,.contact-form select{font-size:1rem;line-height:1.8}.meta{margin-top:55px}.meta div{margin-bottom:40px}.meta h4,.contact-form label{font-size:.7rem;letter-spacing:.22rem;text-transform:uppercase;color:#cba76b;margin-bottom:12px;display:block}.contact-form{display:grid;gap:22px}.contact-form input,.contact-form textarea,.contact-form select{background:#0b0b0b;border:1px solid rgba(203,167,107,.16);padding:18px;color:#f5efe6}.contact-form textarea{min-height:180px}.submit{background:#cba76b;color:#050505;border:none;padding:18px 34px;font-size:.82rem;letter-spacing:.18rem;text-transform:uppercase;width:max-content;cursor:pointer}.footer{text-align:center;padding:70px 6vw;border-top:1px solid rgba(255,255,255,.05)}.footer p{font-size:.95rem;color:#b9aa9a}.reveal{opacity:0;transform:translateY(50px);transition:1s cubic-bezier(.16,1,.3,1)}.reveal.active{opacity:1;transform:none}@media(max-width:900px){nav ul{gap:18px;flex-wrap:wrap}.hero-logo{width:190px}.hero h1{font-size:3.5rem}.stats-grid,.process-grid,.portfolio-grid,.pricing-grid,.contact-grid{grid-template-columns:1fr}.section{padding:90px 7vw}}</style></head><body><nav><ul><li><a href='#process'>Process</a></li><li><a href='#portfolio'>Portfolio</a></li><li><a href='#pricing'>Pricing</a></li><li><a href='#contact'>Contact</a></li></ul></nav><section class='hero'><div class='hero-content reveal active'><img class='hero-logo' src='https://raw.githubusercontent.com/vista-studio/VistaStudio/main/logo.png' alt='Vista Studio'><h1>Listings that make people <em>stop scrolling</em></h1></div></section><section class='stats reveal'><div class='stats-grid'><div class='stat'><h2>4K</h2><p>Shot on Sony A7C full-frame professional camera</p></div><div class='stat'><h2>5–7</h2><p>48h rush available for urgent listings</p></div><div class='stat'><h2>3×</h2><p>Listings with video get more buyer contact</p></div><div class='stat'><h2>SFL</h2><p>Boca Raton — serving all of South Florida</p></div></div></section></body></html>
